<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — The Beautiful Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --gold: #FFD700;
    --gold-deep: #B8860B;
    --gold-glow: rgba(255,215,0,0.4);
    --emerald: #00C853;
    --emerald-dark: #007A33;
    --pitch: #0a0f0a;
    --dark: #060B06;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,215,0,0.15);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ── CANVAS ── */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 3rem;
    background: rgba(6,11,6,0.7);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--glass-border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold-deep));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: #000 !important;
    padding: 0.5rem 1.4rem;
    border-radius: 2px;
    font-weight: 700 !important;
  }

  /* ── HERO ── */
  #hero {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }

  .hero-eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 16vw, 14rem);
    line-height: 0.85;
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #ffffff 0%, #FFD700 55%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 60px rgba(255,215,0,0.3));
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .hero-subtitle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 4vw, 3.5rem);
    letter-spacing: 0.3em;
    color: var(--emerald);
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
    text-shadow: 0 0 30px rgba(0,200,83,0.5);
  }

  .hero-meta {
    display: flex;
    gap: 3rem;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-top: 0.3rem;
    display: block;
  }

  .hero-divider {
    width: 1px;
    background: rgba(255,215,0,0.2);
    align-self: stretch;
  }

  .hero-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
  }

  .btn-primary {
    padding: 0.9rem 2.5rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: #000;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 40px rgba(255,215,0,0.4);
  }

  .btn-secondary {
    padding: 0.9rem 2.5rem;
    background: transparent;
    color: #fff;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
  }

  /* Scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.5s forwards;
  }

  .scroll-hint span {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(255,215,0,0.6), transparent);
    animation: scrollPulse 1.8s ease infinite;
  }

  /* ── BALL 3D CSS ── */
  .hero-ball-wrap {
    position: absolute;
    right: 8%;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 260px;
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
  }

  .ball-3d {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    position: relative;
    animation: ballSpin 12s linear infinite;
    background:
      radial-gradient(circle at 35% 35%, #fff 0%, rgba(255,255,255,0) 55%),
      radial-gradient(circle at 70% 65%, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 50%),
      conic-gradient(
        #1a1a1a 0deg, #fff 30deg, #1a1a1a 60deg, #fff 90deg,
        #1a1a1a 120deg, #fff 150deg, #1a1a1a 180deg, #fff 210deg,
        #1a1a1a 240deg, #fff 270deg, #1a1a1a 300deg, #fff 330deg, #1a1a1a 360deg
      );
    box-shadow:
      0 0 0 2px rgba(255,215,0,0.3),
      0 0 40px rgba(255,215,0,0.2),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 -20px 40px rgba(0,0,0,0.4),
      inset 0 10px 30px rgba(255,255,255,0.1);
  }

  .ball-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }

  /* ── SECTION SHARED ── */
  section {
    position: relative;
    z-index: 1;
  }

  .section-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6rem 2rem;
  }

  .section-eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: block;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 7vw, 6rem);
    line-height: 0.9;
    letter-spacing: 0.04em;
    margin-bottom: 2rem;
  }

  /* ── HOST SECTION ── */
  #host {
    background: linear-gradient(180deg, transparent 0%, rgba(0,200,83,0.04) 50%, transparent 100%);
  }

  .host-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
  }

  .host-flags {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
  }

  .flag-card {
    aspect-ratio: 4/3;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    cursor: pointer;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .flag-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 20px 60px rgba(255,215,0,0.25);
  }

  .flag-card.usa { background: linear-gradient(180deg, #B22234 33%, #fff 33%, #fff 66%, #3C3B6E 66%); }
  .flag-card.canada {
    background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .flag-card.mexico { background: linear-gradient(90deg, #006847 33%, #fff 33%, #fff 66%, #CE1126 66%); }

  .flag-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    padding: 1rem 0.7rem 0.5rem;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .canada-maple {
    font-size: 2.5rem;
    color: #FF0000;
  }

  .host-text p {
    font-size: 1rem;
    line-height: 1.8;
    color: rgba(255,255,255,0.65);
    margin-bottom: 1.5rem;
  }

  .host-numbers {
    display: flex;
    gap: 2.5rem;
    margin-top: 2rem;
  }

  .hnum-val {
    font-family: 'Orbitron', monospace;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .hnum-lab {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 0.4rem;
    display: block;
  }

  /* ── GROUPS SECTION ── */
  #groups {
    background: linear-gradient(180deg, transparent 0%, rgba(255,215,0,0.03) 50%, transparent 100%);
  }

  .groups-header {
    text-align: center;
    margin-bottom: 4rem;
  }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.2rem;
  }

  .group-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    padding: 1.5rem 1.2rem;
    backdrop-filter: blur(10px);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .group-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .group-card:hover {
    border-color: rgba(255,215,0,0.35);
    transform: translateY(-4px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(255,215,0,0.08);
  }

  .group-card:hover::before { opacity: 1; }

  .group-letter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--gold);
    opacity: 0.15;
    position: absolute;
    top: 0.5rem; right: 1rem;
    line-height: 1;
  }

  .group-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 1rem;
    display: block;
  }

  .team-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: all 0.2s;
  }

  .team-row:last-child { border-bottom: none; }

  .team-row:hover { padding-left: 0.3rem; }

  .team-flag-emoji {
    font-size: 1.2rem;
    line-height: 1;
  }

  .team-name {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.05em;
  }

  .team-rank {
    margin-left: auto;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.25);
  }

  /* ── STADIUMS ── */
  #stadiums {
    overflow: hidden;
  }

  .stadiums-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .stadium-track {
    display: flex;
    gap: 1.5rem;
    animation: slideTrack 40s linear infinite;
    width: max-content;
  }

  .stadium-track:hover { animation-play-state: paused; }

  .stadium-card {
    width: 320px;
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(8px);
    transition: transform 0.4s, box-shadow 0.4s;
    cursor: pointer;
  }

  .stadium-card:hover {
    transform: scale(1.03);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.1);
  }

  .stadium-visual {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    position: relative;
    overflow: hidden;
  }

  .stadium-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
  }

  .stadium-info {
    padding: 1.2rem;
  }

  .stadium-city {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 0.3rem;
    display: block;
  }

  .stadium-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .stadium-cap {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  /* ── TROPHY SECTION ── */
  #trophy {
    text-align: center;
    padding: 8rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .trophy-bg-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(6rem, 20vw, 18rem);
    color: rgba(255,215,0,0.03);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.1em;
  }

  .trophy-3d {
    font-size: 8rem;
    display: inline-block;
    animation: trophyFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 40px rgba(255,215,0,0.6));
    margin-bottom: 2rem;
  }

  .trophy-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 5rem);
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold-deep));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .trophy-subtitle {
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    max-width: 500px;
    margin: 0 auto 3rem;
    line-height: 1.8;
  }

  .champions-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    justify-content: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .champion-tag {
    padding: 0.4rem 1rem;
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 2px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s;
    cursor: pointer;
  }

  .champion-tag:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,215,0,0.05);
  }

  .champion-wins {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    background: var(--gold);
    color: #000;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
  }

  /* ── COUNTDOWN ── */
  #countdown {
    background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,100,40,0.1));
    border-top: 1px solid var(--glass-border);
    border-bottom: 1px solid var(--glass-border);
  }

  .countdown-inner {
    text-align: center;
    padding: 5rem 2rem;
  }

  .countdown-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2rem;
    display: block;
  }

  .countdown-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    letter-spacing: 0.08em;
    margin-bottom: 3rem;
    color: rgba(255,255,255,0.85);
  }

  .countdown-digits {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .cd-unit {
    text-align: center;
    min-width: 100px;
  }

  .cd-num {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 900;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: block;
    line-height: 1;
    text-shadow: none;
  }

  .cd-sep {
    font-family: 'Orbitron', monospace;
    font-size: 4rem;
    font-weight: 900;
    color: var(--gold);
    opacity: 0.3;
    align-self: center;
    padding-bottom: 1.5rem;
    animation: blink 1s ease-in-out infinite;
  }

  .cd-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-top: 0.6rem;
    display: block;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    padding: 3rem 2rem;
    border-top: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: gap;
    background: rgba(0,0,0,0.4);
  }

  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .footer-text {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }

  .footer-socials {
    display: flex;
    gap: 1rem;
  }

  .social-dot {
    width: 36px; height: 36px;
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
  }

  .social-dot:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(255,215,0,0.05);
  }

  /* ── LIVE TICKER ── */
  .ticker-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 90;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--glass-border);
    padding: 0.6rem 0;
    overflow: hidden;
  }

  .ticker-inner {
    display: flex;
    align-items: center;
    gap: 0;
    animation: ticker 30s linear infinite;
    width: max-content;
  }

  .ticker-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    background: var(--gold);
    color: #000;
    padding: 0.15rem 0.7rem;
    letter-spacing: 0.1em;
    margin-right: 2rem;
    white-space: nowrap;
  }

  .ticker-item {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    padding: 0 2.5rem;
    border-right: 1px solid rgba(255,255,255,0.1);
  }

  .ticker-item .score {
    color: var(--gold);
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
  }

  /* ── PITCH LINES ── */
  .pitch-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 59px,
        rgba(255,255,255,0.8) 60px
      );
  }

  /* ── PARTICLE CURSOR ── */
  #cursor-glow {
    position: fixed;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes ballSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
